<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW-Dormitory | ระบบหอพักนักเรียน</title>
    
    <!-- ฟอนต์ Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#ec4899', // Pink 500
                        secondary: '#3b82f6', // Blue 500
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .bg-gradient-theme { background: linear-gradient(135deg, #ec4899 0%, #3b82f6 100%); }
        .text-gradient { background: linear-gradient(135deg, #ec4899 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-gray-800">

    <div id="app" class="flex-grow flex flex-col"></div>

    <!-- Minimalist Footer -->
    <footer class="mt-auto py-8 text-center text-gray-400 text-sm font-medium bg-transparent">
        <div class="flex flex-col items-center justify-center gap-2">
            <div class="flex items-center gap-2">
                <img src="https://img2.pic.in.th/logo-SW.png" alt="Logo" class="w-5 h-5 grayscale opacity-70">
                <span>โรงเรียนศรีวารินทร์</span>
            </div>
            <p>ระบบหอพักนักเรียน - สพม. นราธิวาส</p>
            <p class="text-xs mt-1">&lt;\dev&gt; อับดุลฮากิม อ๊ะหมะ</p>
        </div>
    </footer>

    <script>
        // ==========================================
        // 1. Mock Data (จำลองข้อมูล)
        // ==========================================
        const LOGO_URL = "https://img2.pic.in.th/logo-SW.png";
        const ADMIN_PIN = "999999";

        let systemSettings = {
            targetLat: 6.4255, 
            targetLng: 101.8252,
            radius: 50 // รัศมีที่อนุญาต (เมตร)
        };

        let mockGuardians = [
            { id: "G001", name: "ครูสมปอง ดูแลดี", pin: "123456" },
            { id: "G002", name: "ครูมาลี ใจเย็น", pin: "654321" }
        ];

        let mockStudents = [
            { id: "65001", name: "นาย สมชาย ใจดี", phone: "0811111111", room: "101", bed: "A1", score: 100, status: "in", latestPhoto: null, scoreHistory: [] },
            { id: "65002", name: "นางสาว สมหญิง รักเรียน", phone: "0822222222", room: "201", bed: "B1", score: 95, status: "out", latestPhoto: null, scoreHistory: [{ date: new Date().toISOString(), oldScore: 100, newScore: 95, reason: "ไม่ทำเวรทำความสะอาด" }] },
            { id: "65003", name: "นาย สมศักดิ์ เก่งกาจ", phone: "0833333333", room: "102", bed: "A2", score: 80, status: "in", latestPhoto: null, scoreHistory: [{ date: new Date().toISOString(), oldScore: 100, newScore: 80, reason: "ทะเลาะวิวาท" }] },
        ];

        let mockRequests = [
            { id: "REQ-001", studentId: "65002", studentName: "นางสาว สมหญิง รักเรียน", reason: "กลับบ้านช่วงเสาร์-อาทิตย์", outDate: "2026-04-25T16:00", inDate: "2026-04-27T17:00", status: "approved" },
            { id: "REQ-002", studentId: "65003", studentName: "นาย สมศักดิ์ เก่งกาจ", reason: "ไปซื้อของใช้ส่วนตัว", outDate: "2026-04-28T16:00", inDate: "2026-04-28T19:00", status: "pending" }
        ];

        let mockCheckinHistory = [];

        // ==========================================
        // 2. State Management
        // ==========================================
        let currentUser = null; 
        let currentView = 'login'; 
        let loginTab = 'student'; 
        let cameraStream = null;
        let currentPosition = null;

        // ==========================================
        // 3. Core Functions
        // ==========================================
        function render() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = ''; 

            if (!currentUser) {
                appDiv.innerHTML = getLoginView();
            } else {
                appDiv.innerHTML += getNavbar();
                const contentDiv = document.createElement('div');
                contentDiv.className = 'container mx-auto px-4 py-8 flex-grow';
                
                if (currentUser.role === 'student') {
                    if (currentView === 'student_dash') contentDiv.innerHTML = getStudentDashboard();
                    else if (currentView === 'student_checkin') contentDiv.innerHTML = getStudentCheckInOut();
                    else if (currentView === 'student_leave') contentDiv.innerHTML = getStudentLeave();
                } else if (currentUser.role === 'guardian') {
                    if (currentView === 'guardian_dash') contentDiv.innerHTML = getGuardianDashboard();
                    else if (currentView === 'guardian_req') contentDiv.innerHTML = getGuardianRequests();
                } else if (currentUser.role === 'admin') {
                    if (currentView === 'admin_dash') contentDiv.innerHTML = getAdminDashboard();
                }
                
                appDiv.appendChild(contentDiv);
            }

            // ระบบจัดการกล้อง
            if (currentView === 'student_checkin' && currentUser && currentUser.data.status === 'out') {
                startCamera();
            } else {
                stopCamera();
            }
        }

        function navigate(view) {
            currentView = view;
            render();
        }

        // ==========================================
        // 4. View Generators (UI Templates)
        // ==========================================
        function getNavbar() {
            const role = currentUser.role;
            let name = '';
            let menuItems = '';

            if (role === 'student') {
                name = currentUser.data.name;
                menuItems = `
                    <button onclick="navigate('student_dash')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'student_dash' ? 'bg-white/20' : ''}">หน้าแรก</button>
                    <button onclick="navigate('student_checkin')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'student_checkin' ? 'bg-white/20' : ''}">เข้า-ออกหอพัก</button>
                    <button onclick="navigate('student_leave')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'student_leave' ? 'bg-white/20' : ''}">ขออนุญาต</button>
                `;
            } else if (role === 'guardian') {
                name = currentUser.data.name;
                menuItems = `
                    <button onclick="navigate('guardian_dash')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'guardian_dash' ? 'bg-white/20' : ''}">แผงควบคุม</button>
                    <button onclick="navigate('guardian_req')" class="hover:bg-white/20 px-3 py-2 rounded transition ${currentView === 'guardian_req' ? 'bg-white/20' : ''}">จัดการคำขอ</button>
                `;
            } else if (role === 'admin') {
                name = 'System Admin';
                menuItems = `
                    <button onclick="navigate('admin_dash')" class="bg-white/20 px-3 py-2 rounded transition">จัดการระบบ</button>
                `;
            }

            const roleLabels = { 'student': 'นักเรียนหอพัก', 'guardian': 'ผู้ดูแลหอพัก', 'admin': 'ผู้ดูแลระบบ' };

            return `
                <nav class="bg-gradient-theme text-white shadow-lg sticky top-0 z-50">
                    <div class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('${role}_dash')">
                            <img src="${LOGO_URL}" alt="Logo" class="h-10 w-10 bg-white rounded-full p-1 shadow">
                            <span class="font-bold text-xl hidden sm:block">SW-Dormitory</span>
                        </div>
                        <div class="flex items-center gap-2 md:gap-6 overflow-x-auto text-sm md:text-base">
                            ${menuItems}
                        </div>
                        <div class="flex items-center gap-3 mt-3 w-full md:w-auto md:mt-0 justify-end border-t border-white/20 md:border-none pt-2 md:pt-0">
                            <div class="text-right leading-tight hidden md:block">
                                <p class="text-sm font-semibold">${name}</p>
                                <p class="text-xs text-blue-200">${roleLabels[role]}</p>
                            </div>
                            <button onclick="handleLogout()" class="bg-white text-pink-600 hover:bg-gray-100 px-4 py-2 rounded-full text-sm font-semibold shadow transition flex items-center gap-2">
                                <i class="fa-solid fa-right-from-bracket"></i> <span class="hidden sm:inline">ออกจากระบบ</span>
                            </button>
                        </div>
                    </div>
                </nav>
            `;
        }

        function getLoginView() {
            return `
                <div class="flex-grow flex flex-col items-center justify-center p-4">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative z-10">
                        <div class="bg-gradient-theme p-6 text-center text-white">
                            <img src="${LOGO_URL}" alt="Logo" class="h-20 w-20 mx-auto bg-white rounded-full p-2 shadow-md mb-3 border-2 border-pink-200">
                            <h1 class="text-2xl font-bold">SW-Dormitory</h1>
                            <p class="text-sm opacity-90 mt-1">ระบบจัดการหอพักนักเรียน</p>
                        </div>

                        <div class="flex border-b">
                            <button onclick="switchLoginTab('student')" class="flex-1 py-3 font-semibold transition ${loginTab === 'student' ? 'text-pink-600 border-b-2 border-pink-600 bg-pink-50' : 'text-gray-500 hover:text-pink-400'}">
                                <i class="fa-solid fa-user-graduate mr-2"></i>นักเรียน
                            </button>
                            <button onclick="switchLoginTab('guardian')" class="flex-1 py-3 font-semibold transition ${loginTab === 'guardian' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:text-blue-400'}">
                                <i class="fa-solid fa-user-tie mr-2"></i>ผู้ดูแล
                            </button>
                        </div>

                        <div class="p-6">
                            ${loginTab === 'student' ? `
                                <div>
                                    <label class="block text-gray-700 text-sm font-bold mb-2">รหัสนักเรียน (5 หลัก)</label>
                                    <div class="relative">
                                        <i class="fa-solid fa-id-card absolute left-3 top-3.5 text-gray-400"></i>
                                        <input type="text" id="studentIdInput" class="w-full pl-10 pr-3 py-3 rounded-lg bg-gray-50 border focus:bg-white focus:ring-2 focus:ring-pink-500 outline-none transition" placeholder="เช่น 65001" onkeypress="if(event.key === 'Enter') handleStudentLogin()">
                                    </div>
                                    <button onclick="handleStudentLogin()" class="w-full mt-6 bg-gradient-theme text-white font-bold py-3 px-4 rounded-lg shadow hover:shadow-lg transform hover:-translate-y-0.5 transition">
                                        เข้าสู่ระบบนักเรียน
                                    </button>
                                </div>
                            ` : `
                                <div>
                                    <label class="block text-gray-700 text-sm font-bold mb-2">รหัสประจำตัวผู้ดูแล</label>
                                    <div class="relative mb-4">
                                        <i class="fa-solid fa-user absolute left-3 top-3.5 text-gray-400"></i>
                                        <input type="text" id="guardianIdInput" class="w-full pl-10 pr-3 py-3 rounded-lg bg-gray-50 border focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="เช่น G001">
                                    </div>
                                    <label class="block text-gray-700 text-sm font-bold mb-2">รหัส PIN (6 หลัก)</label>
                                    <div class="relative">
                                        <i class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-400"></i>
                                        <input type="password" id="guardianPinInput" class="w-full pl-10 pr-3 py-3 rounded-lg bg-gray-50 border focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="******" onkeypress="if(event.key === 'Enter') handleGuardianLogin()">
                                    </div>
                                    <button onclick="handleGuardianLogin()" class="w-full mt-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold py-3 px-4 rounded-lg shadow hover:shadow-lg transform hover:-translate-y-0.5 transition">
                                        เข้าสู่ระบบผู้ดูแล
                                    </button>
                                </div>
                            `}
                        </div>
                    </div>
                    
                    <button onclick="promptAdminLogin()" class="mt-6 text-sm text-gray-400 hover:text-gray-600 flex items-center gap-1 transition">
                        <i class="fa-solid fa-shield-halved"></i> สำหรับผู้ดูแลระบบ
                    </button>
                </div>
            `;
        }

        // --- Student Views ---
        function getStudentDashboard() {
            const s = currentUser.data;
            const myHistory = mockCheckinHistory.filter(h => h.studentId === s.id);
            const myRequests = mockRequests.filter(r => r.studentId === s.id);
            
            return `
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">แผงควบคุมนักเรียน</h2>
                    <p class="text-gray-500">ยินดีต้อนรับ, ${s.name}</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <!-- Profile Card -->
                    <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-pink-500 md:col-span-2 flex flex-col md:flex-row items-center gap-6">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=ec4899&color=fff&size=120" class="rounded-full shadow-lg border-4 border-white">
                        <div class="w-full">
                            <div class="grid grid-cols-2 gap-4 text-sm md:text-base">
                                <div class="bg-gray-50 p-3 rounded-lg"><p class="text-gray-500 text-xs">รหัส</p><p class="font-bold">${s.id}</p></div>
                                <div class="bg-gray-50 p-3 rounded-lg"><p class="text-gray-500 text-xs">เบอร์ติดต่อ</p><p class="font-bold">${s.phone || '-'}</p></div>
                                <div class="bg-gray-50 p-3 rounded-lg"><p class="text-gray-500 text-xs">ห้องพัก</p><p class="font-bold text-blue-600">${s.room} / ${s.bed}</p></div>
                                <div class="bg-gray-50 p-3 rounded-lg col-span-2"><p class="text-gray-500 text-xs">สถานะปัจจุบัน</p>
                                    <p class="text-lg font-bold ${s.status === 'in' ? 'text-green-500' : 'text-orange-500'}">
                                        <i class="fa-solid ${s.status === 'in' ? 'fa-house-user' : 'fa-person-walking-arrow-right'}"></i> 
                                        ${s.status === 'in' ? 'เช็คอิน (อยู่ในหอพัก)' : 'เช็คเอาท์ (อยู่นอกหอพัก)'}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Score Card -->
                    <div class="bg-gradient-theme rounded-xl shadow-md p-6 text-white text-center flex flex-col justify-center relative overflow-hidden">
                        <i class="fa-solid fa-star absolute -right-4 -bottom-4 text-8xl text-white opacity-10"></i>
                        <p class="text-lg opacity-90 mb-2">คะแนนพฤติกรรม</p>
                        <div class="text-6xl font-bold mb-2 z-10">${s.score}<span class="text-2xl font-normal">/100</span></div>
                        <div class="w-full bg-white/30 rounded-full h-2 mt-2 z-10">
                            <div class="bg-white h-2 rounded-full" style="width: ${s.score}%"></div>
                        </div>
                    </div>
                </div>

                <!-- History In/Out -->
                <div class="bg-white rounded-xl shadow-md overflow-hidden mb-6">
                    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <h3 class="font-bold text-gray-700"><i class="fa-solid fa-clock-rotate-left mr-2"></i>ประวัติการเข้า-ออกหอพัก</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-gray-600 text-sm">
                                    <th class="p-4">วัน-เวลา</th>
                                    <th class="p-4">ประเภท</th>
                                    <th class="p-4 text-center">รูปถ่าย (ตอนเข้า)</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                ${myHistory.length === 0 ? `<tr><td colspan="3" class="p-6 text-center text-gray-400">ยังไม่มีประวัติการทำรายการ</td></tr>` : 
                                  myHistory.map(h => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-4 font-medium text-gray-700">${formatDate(h.timestamp)}</td>
                                        <td class="p-4">
                                            ${h.type === 'in' 
                                                ? '<span class="text-green-600 bg-green-50 px-2 py-1 rounded text-xs font-bold"><i class="fa-solid fa-arrow-right-to-bracket mr-1"></i>เช็คอินเข้า</span>' 
                                                : '<span class="text-orange-500 bg-orange-50 px-2 py-1 rounded text-xs font-bold"><i class="fa-solid fa-arrow-right-from-bracket mr-1"></i>เช็คเอาท์ออก</span>'}
                                        </td>
                                        <td class="p-4 text-center">
                                            ${h.type === 'in' && h.photoData 
                                                ? `<button onclick="viewPhoto('${h.photoData}')" class="text-blue-500 hover:text-blue-700"><i class="fa-solid fa-image fa-lg"></i></button>` 
                                                : '<span class="text-gray-300">-</span>'}
                                        </td>
                                    </tr>
                                  `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Leave Request History -->
                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <h3 class="font-bold text-gray-700"><i class="fa-solid fa-paper-plane mr-2"></i>ประวัติการขออนุญาตกลับบ้าน/ออกนอกบริเวณ</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-gray-600 text-sm">
                                    <th class="p-4">เหตุผล</th>
                                    <th class="p-4">วัน-เวลา ออก</th>
                                    <th class="p-4">วัน-เวลา กลับ</th>
                                    <th class="p-4">สถานะ</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                ${myRequests.length === 0 ? `<tr><td colspan="4" class="p-4 text-center text-gray-500">ไม่มีประวัติการขออนุญาต</td></tr>` : 
                                  myRequests.map(r => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-4">${r.reason}</td>
                                        <td class="p-4">${formatDate(r.outDate)}</td>
                                        <td class="p-4">${formatDate(r.inDate)}</td>
                                        <td class="p-4">
                                            ${r.status === 'pending' ? '<span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs"><i class="fa-solid fa-hourglass-half mr-1"></i>รออนุมัติ</span>' : ''}
                                            ${r.status === 'approved' ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs"><i class="fa-solid fa-check mr-1"></i>อนุมัติ</span>' : ''}
                                            ${r.status === 'rejected' ? '<span class="px-2 py-1 bg-red-100 text-red-700 rounded-full text-xs"><i class="fa-solid fa-xmark mr-1"></i>ไม่อนุมัติ</span>' : ''}
                                        </td>
                                    </tr>
                                  `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function getStudentCheckInOut() {
            const status = currentUser.data.status;
            
            if (status === 'in') {
                return `
                    <div class="max-w-md mx-auto text-center mt-10">
                        <div class="bg-white rounded-2xl shadow-xl p-8">
                            <div class="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="fa-solid fa-person-walking-arrow-right text-5xl text-orange-500"></i>
                            </div>
                            <h2 class="text-3xl font-bold text-gray-800 mb-2">เช็คเอาท์ออกหอพัก</h2>
                            <p class="text-gray-500 mb-8">สถานะปัจจุบันของคุณคือ "อยู่ในหอพัก"<br>กดปุ่มด้านล่างเพื่อบันทึกการออกนอกหอพัก</p>
                            
                            <button onclick="submitCheckout()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition transform hover:-translate-y-1">
                                <i class="fa-solid fa-door-open mr-2"></i> ยืนยันการเช็คเอาท์
                            </button>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="max-w-2xl mx-auto">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800">ระบบเช็คอินเข้าหอพัก</h2>
                            <p class="text-gray-500">กรุณาถ่ายภาพเพื่อยืนยันตัวตนและพิกัด GPS</p>
                        </div>

                        <div class="bg-white rounded-xl shadow-md p-6">
                            <div class="relative bg-gray-900 rounded-lg overflow-hidden aspect-video flex items-center justify-center mb-4 border-2 border-gray-200">
                                <video id="checkinVideo" class="w-full h-full object-cover" autoplay playsinline></video>
                                <canvas id="checkinCanvas" class="hidden w-full h-full object-cover absolute top-0 left-0"></canvas>
                                <div id="cameraLoading" class="absolute text-white text-center">
                                    <i class="fa-solid fa-spinner fa-spin text-3xl mb-2"></i><br>กำลังเปิดกล้อง...
                                </div>
                            </div>

        // --- Camera & GPS Check-in/out ---
        async function startCamera() {
            const video = document.getElementById('checkinVideo');
            const loading = document.getElementById('cameraLoading');
            const gpsStatus = document.getElementById('gpsStatus');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        currentPosition = pos.coords;
                        if(gpsStatus) gpsStatus.innerHTML = `<span class="text-green-600 font-bold"><i class="fa-solid fa-check"></i> ได้รับพิกัดปัจจุบัน: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}</span>`;
                    },
                    (err) => {
                        if(gpsStatus) gpsStatus.innerHTML = `<span class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> ไม่สามารถดึงพิกัดได้ (กรุณาอนุญาต Location)</span>`;
                    }
                );
            }

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                if(video) {
                    video.srcObject = cameraStream;
                    video.onloadedmetadata = () => {
                        if(loading) loading.classList.add('hidden');
                    };
                }
            } catch (err) {
                if(loading) loading.innerHTML = `<i class="fa-solid fa-video-slash text-red-500 text-3xl mb-2"></i><br>เบราว์เซอร์ไม่สามารถเปิดกล้องได้`;
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        }

        function takePhoto() {
            const video = document.getElementById('checkinVideo');
            const canvas = document.getElementById('checkinCanvas');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            video.classList.add('hidden'); 
            canvas.classList.remove('hidden');
            
            document.getElementById('btnCapture').classList.add('hidden');
            document.getElementById('btnRetake').classList.remove('hidden');
            document.getElementById('btnSubmitCheckin').classList.remove('hidden');
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // รัศมีโลก (เมตร)
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(dp/2) * Math.sin(dp/2) +
                      Math.cos(p1) * Math.cos(p2) *
                      Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; 
        }

                confirmButtonText: 'บันทึกการแก้ไข',
                preConfirm: () => {
                    const name = document.getElementById('swal-g-name').value;
                    const pin = document.getElementById('swal-g-pin').value;
                    if (!name || pin.length !== 6) Swal.showValidationMessage('กรุณากรอกชื่อ และ PIN 6 หลัก');
                    return { name, pin };
                }
            }).then((res) => {
                if (res.isConfirmed) {
                    g.name = res.value.name;
                    g.pin = res.value.pin;
                    Swal.fire('สำเร็จ', 'อัปเดตข้อมูลเรียบร้อย', 'success');
                    render();
                }
            });
        }

        function deleteGuardian(id) {
            Swal.fire({
                title: 'ยืนยันการลบ?',
                text: "หากลบแล้วจะไม่สามารถกู้คืนได้",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ใช่, ลบเลย'
            }).then((result) => {
                if (result.isConfirmed) {
                    mockGuardians = mockGuardians.filter(g => g.id !== id);
                    Swal.fire('ลบสำเร็จ!', 'ข้อมูลผู้ดูแลถูกลบแล้ว.', 'success');
                    render();
                }
            });
        }

        // Utils
        function formatDate(isoString) {
            const d = new Date(isoString);
            return d.toLocaleString('th-TH', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) + ' น.';
        }

        // เริ่มต้นการทำงาน (เรียก Render ทันทีที่โหลดเสร็จ)
        window.onload = () => render();
    </script>
</body>
</html>
